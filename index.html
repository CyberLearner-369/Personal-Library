<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="A lifelong catalogue of every physical book you own. Offline-first, private, yours." />
    <meta name="theme-color" content="#f6f5f1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#101413" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" href="icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Library" />
    <title>Personal Library Manager</title>
    <script>
      // Apply the stored theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('plm.theme');
          var dark =
            t === 'dark' ||
            ((t === null || t === 'system') &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* private mode: fall back to light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p style="font-family: sans-serif; padding: 2rem">
        Personal Library Manager needs JavaScript to run. Please enable it and reload.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
